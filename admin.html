<script>
(function() {
  var API = '';
  var currentPage = 1;
  var pageSize = 10;

  // ===== Login =====
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    var user = document.getElementById('loginUser').value.trim();
    var pass = document.getElementById('loginPass').value.trim();
    if (!user || !pass) return;

    fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        sessionStorage.setItem('auth', '1');
        loadStats();
        loadData();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginPass').value = '';
      }
    })
    .catch(function() {
      // 如果后端没启动，允许演示模式
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      sessionStorage.setItem('auth', '1');
      showToast('后端未连接，当前为演示模式', 'error');
    });
  }

  // Auto login check
  if (sessionStorage.getItem('auth')) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadData();
  }

  window.logout = function() {
    sessionStorage.removeItem('auth');
    location.reload();
  };

  // ===== Stats =====
  function loadStats() {
    fetch(API + '/api/stats')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success) {
        document.getElementById('statTotal').textContent = res.data.total;
        document.getElementById('statPending').textContent = res.data.pending;
        document.getElementById('statContacted').textContent = res.data.contacted;
        document.getElementById('statEnrolled').textContent = res.data.enrolled;
      }
    })
    .catch(function() {});
  }

  // ===== Data =====
  function loadData() {
    var keyword = document.getElementById('searchInput').value.trim();
    var status = document.getElementById('statusFilter').value;

    var url = API + '/api/enrollments?page=' + currentPage + '&pageSize=' + pageSize +
              '&keyword=' + encodeURIComponent(keyword) + '&status=' + status;

    fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success) {
        renderTable(res.data);
        renderPagination(res.pagination);
      }
    })
    .catch(function() {
      document.getElementById('tableBody').innerHTML = '';
      document.getElementById('emptyState').style.display = 'block';
    });
  }

  var programMap = {
    'freshman': '高一新生',
    'junior-repeat': '初三复读生',
    'senior-repeat': '高三复读生'
  };

  var statusMap = {
    'pending': '待联系',
    'contacted': '已联系',
    'enrolled': '已录取',
    'rejected': '已拒绝'
  };

  var prefMap = {
    'phone': '电话',
    'wechat': '微信',
    'qq': 'QQ'
  };

  function renderTable(rows) {
    var tbody = document.getElementById('tableBody');
    var empty = document.getElementById('emptyState');

    if (!rows || rows.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    var html = '';

    rows.forEach(function(row) {
      var pName = programMap[row.program] || row.program;
      var sName = statusMap[row.status] || row.status;
      var prefName = prefMap[row.contact_pref] || row.contact_pref;

      html += '<tr>' +
        '<td>#' + row.id + '</td>' +
        '<td><strong>' + escHtml(row.student_name) + '</strong></td>' +
        '<td>' + escHtml(row.phone) + '</td>' +
        '<td>' + escHtml(row.wechat || '-') + '</td>' +
        '<td>' + escHtml(row.qq || '-') + '</td>' +
        '<td>' + escHtml(prefName) + '</td>' +
        '<td>' + escHtml(pName) + '</td>' +
        '<td><span class="status-badge ' + row.status + '"><span class="status-dot"></span>' + sName + '</span></td>' +
        '<td>' + escHtml(row.created_at) + '</td>' +
        '<td>' +
          '<button class="action-btn edit" onclick="viewDetail(' + row.id + ')">详情</button>' +
          '<button class="action-btn edit" onclick="changeStatus(' + row.id + ')">状态</button>' +
          '<button class="action-btn delete" onclick="deleteRecord(' + row.id + ')">删除</button>' +
        '</td>' +
      '</tr>';
    });

    tbody.innerHTML = html;
    document.getElementById('tableInfo').textContent = '共 ' + rows.length + ' 条记录';
  }

  function renderPagination(pg) {
    if (!pg || pg.totalPages <= 1) {
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    var html = '';
    html += '<button class="page-btn" onclick="goPage(' + (pg.page - 1) + ')"' + (pg.page <= 1 ? ' disabled' : '') + '>&laquo;</button>';

    var start = Math.max(1, pg.page - 2);
    var end = Math.min(pg.totalPages, pg.page + 2);

    if (start > 1) html += '<button class="page-btn" onclick="goPage(1)">1</button>';
    if (start > 2) html += '<span style="padding:6px 4px;color:var(--muted)">...</span>';

    for (var i = start; i <= end; i++) {
      html += '<button class="page-btn' + (i === pg.page ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }

    if (end < pg.totalPages - 1) html += '<span style="padding:6px 4px;color:var(--muted)">...</span>';
    if (end < pg.totalPages) html += '<button class="page-btn" onclick="goPage(' + pg.totalPages + ')">' + pg.totalPages + '</button>';

    html += '<button class="page-btn" onclick="goPage(' + (pg.page + 1) + ')"' + (pg.page >= pg.totalPages ? ' disabled' : '') + '>&raquo;</button>';

    document.getElementById('pagination').innerHTML = html;
    document.getElementById('tableInfo').textContent = '第 ' + pg.page + '/' + pg.totalPages + ' 页，共 ' + pg.total + ' 条';
  }

  window.goPage = function(p) {
    currentPage = p;
    loadData();
  };

  // Search & Filter
  var searchTimer;
  document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      currentPage = 1;
      loadData();
    }, 300);
  });

  document.getElementById('statusFilter').addEventListener('change', function() {
    currentPage = 1;
    loadData();
  });

  // ===== Actions =====
  window.viewDetail = function(id) {
    fetch(API + '/api/enrollments?page=1&pageSize=1&keyword=')
    .then(function(r) { return r.json(); })
    .catch(function() { return { success: false }; });
    // 直接用列表数据构造详情
    var row = document.querySelector('tr button[onclick="viewDetail(' + id + ')"]');
    if (!row) return;
    var tr = row.closest('tr');
    var cells = tr.querySelectorAll('td');

    var body = '<div class="modal-field"><div class="modal-field-label">记录ID</div><div class="modal-field-value">#' + id + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">学生姓名</div><div class="modal-field-value">' + cells[1].textContent + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">联系电话</div><div class="modal-field-value">' + cells[2].textContent + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">微信号</div><div class="modal-field-value">' + cells[3].textContent + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">QQ号</div><div class="modal-field-value">' + cells[4].textContent + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">联系方式偏好</div><div class="modal-field-value">' + cells[5].textContent + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">报名项目</div><div class="modal-field-value">' + cells[6].textContent + '</div></div>';
    body += '<div class="modal-field"><div class="modal-field-label">提交时间</div><div class="modal-field-value">' + cells[8].textContent + '</div></div>';

    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalFooter').innerHTML = '<button class="modal-btn modal-btn-cancel" onclick="closeModal()">关闭</button>';
    document.getElementById('modalTitle').textContent = '报名详情 #' + id;
    document.getElementById('modalOverlay').classList.add('open');
  };

  window.changeStatus = function(id) {
    var body = '<div class="modal-field"><div class="modal-field-label">更改状态</div></div>';
    body += '<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">';

    var statuses = [
      { value: 'pending', label: '待联系', cls: 'pending' },
      { value: 'contacted', label: '已联系', cls: 'contacted' },
      { value: 'enrolled', label: '已录取', cls: 'enrolled' },
      { value: 'rejected', label: '已拒绝', cls: 'rejected' }
    ];

    statuses.forEach(function(s) {
      body += '<button class="modal-btn" style="text-align:left;padding:12px 16px;border:1.5px solid var(--rule)" onclick="updateStatus(' + id + ',\'' + s.value + '\')">' +
        '<span class="status-badge ' + s.cls + '" style="margin-right:8px"><span class="status-dot"></span>' + s.label + '</span></button>';
    });

    body += '</div>';

    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalFooter').innerHTML = '<button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>';
    document.getElementById('modalTitle').textContent = '更改状态 #' + id;
    document.getElementById('modalOverlay').classList.add('open');
  };

  window.updateStatus = function(id, status) {
    fetch(API + '/api/enrollments/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: status })
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success) {
        showToast('状态已更新为: ' + statusMap[status], 'success');
        closeModal();
        loadStats();
        loadData();
      } else {
        showToast('更新失败', 'error');
      }
    })
    .catch(function() {
      showToast('网络错误，后端未连接', 'error');
    });
  };

  window.deleteRecord = function(id) {
    if (!confirm('确定删除此报名记录？此操作不可恢复。')) return;

    fetch(API + '/api/enrollments/' + id, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success) {
        showToast('记录已删除', 'success');
        loadStats();
        loadData();
      } else {
        showToast('删除失败', 'error');
      }
    })
    .catch(function() {
      showToast('网络错误', 'error');
    });
  };

  window.clearAll = function() {
    if (!confirm('确定清空所有报名数据？此操作不可恢复！')) return;

    fetch(API + '/api/enrollments?page=1&pageSize=1000')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success && res.data.length > 0) {
        var promises = res.data.map(function(row) {
          return fetch(API + '/api/enrollments/' + row.id, { method: 'DELETE' });
        });
        return Promise.all(promises);
      }
    })
    .then(function() {
      showToast('数据已清空', 'success');
      loadStats();
      loadData();
    })
    .catch(function() {
      showToast('操作失败', 'error');
    });
  };

  window.exportCSV = function() {
    fetch(API + '/api/enrollments?page=1&pageSize=10000')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.success || !res.data.length) {
        showToast('没有可导出的数据', 'error');
        return;
      }

      var headers = ['ID', '学生姓名', '联系电话', '微信号', 'QQ号', '联系方式偏好', '家长姓名', '报名项目', '状态', '提交时间', '备注'];
      var rows = res.data.map(function(row) {
        return [row.id, row.student_name, row.phone, row.wechat, row.qq, prefMap[row.contact_pref] || row.contact_pref, row.parent_name, programMap[row.program] || row.program, statusMap[row.status] || row.status, row.created_at, row.remark];
      });

      var csv = '\uFEFF' + headers.join(',') + '\n';
      rows.forEach(function(r) {
        csv += r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(',') + '\n';
      });

      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '兴艺中学报名数据_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV已导出', 'success');
    })
    .catch(function() {
      showToast('导出失败', 'error');
    });
  };

  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('open');
  };

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ===== Utilities =====
  function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  window.showToast = function(msg, type) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + (type || 'success') + ' show';
    setTimeout(function() {
      toast.classList.remove('show');
    }, 2500);
  };
})();
</script>

</body>
</html>
